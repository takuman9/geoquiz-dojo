<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuiz Dojo — 問題管理</title>
<link rel="icon" href="favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
  background: #0f172a; color: #e2e8f0; padding: 20px; }
h1 { font-size: 1.3rem; margin-bottom: 14px; }
.bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
input[type=password] { padding: 9px 12px; border-radius: 8px; border: 1px solid #334155;
  background: #1e293b; color: #e2e8f0; width: 260px; }
button { padding: 9px 14px; border-radius: 8px; border: none; cursor: pointer;
  background: #38bdf8; color: #082f49; font-weight: bold; }
button.danger { background: transparent; color: #f87171; border: 1px solid #f87171; }
button.regen { background: transparent; color: #f59e0b; border: 1px solid #f59e0b; font-weight: normal; padding: 4px 8px; font-size: .75rem; }
button:disabled { opacity: .4; cursor: default; }
#status { color: #94a3b8; font-size: .85rem; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th, td { border: 1px solid #334155; padding: 8px; vertical-align: top; text-align: left; }
th { background: #1e293b; position: sticky; top: 0; }
td.hint { min-width: 220px; }
.fb { margin-top: 6px; font-size: .78rem; color: #94a3b8; display: flex; gap: 10px; align-items: center; }
.fb .bad { color: #f87171; font-weight: bold; }
.flag { width: 24px; vertical-align: middle; margin-right: 6px; border-radius: 2px; }
.meta { color: #94a3b8; font-size: .75rem; }
.wrap { overflow-x: auto; max-height: 80vh; overflow-y: auto; border-radius: 10px; }
.summary-cell { max-width: 260px; color: #cbd5e1; }
</style>
</head>
<body>
<h1>🌍 GeoQuiz Dojo — 問題管理(管理者モード)</h1>
<div class="bar">
  <input id="token" type="password" placeholder="ADMIN_TOKEN を入力">
  <button id="load">読み込み</button>
  <span id="status"></span>
</div>
<div class="wrap">
  <table id="tbl" hidden>
    <thead>
      <tr><th>#</th><th>国</th><th>言語 / カテゴリ</th><th>ヒント1</th><th>ヒント2</th><th>ヒント3</th><th>解説</th><th>操作</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const status = m => $("status").textContent = m;
const headers = () => ({ "Content-Type": "application/json", "x-admin-token": $("token").value.trim() });

$("token").value = localStorage.getItem("gq_admin_token") || "";

async function api(path, opt = {}) {
  const r = await fetch(path, { headers: headers(), ...opt });
  if (r.status === 401) throw new Error("認証エラー: ADMIN_TOKEN が違います");
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

function hintCell(q, i) {
  const td = document.createElement("td");
  td.className = "hint";
  const txt = document.createElement("div");
  txt.textContent = q.hints[i];
  const fb = document.createElement("div");
  fb.className = "fb";
  const down = q.fb.down[i];
  fb.innerHTML = `<span>👍 ${q.fb.up[i]}</span><span class="${down ? "bad" : ""}">👎 ${down}</span>`;
  const btn = document.createElement("button");
  btn.className = "regen"; btn.textContent = "♻ 再生成";
  btn.onclick = async () => {
    btn.disabled = true; btn.textContent = "生成中...";
    try {
      const d = await api("/api/admin/regen", { method: "POST", body: JSON.stringify({ qid: q.qid, hint: i }) });
      txt.textContent = d.hint;
      fb.innerHTML = `<span>👍 0</span><span>👎 0</span>`;
      fb.appendChild(btn);
      btn.textContent = "♻ 再生成";
    } catch (e) { alert(e.message); btn.textContent = "♻ 再生成"; }
    btn.disabled = false;
  };
  fb.appendChild(btn);
  td.append(txt, fb);
  return td;
}

async function load() {
  localStorage.setItem("gq_admin_token", $("token").value.trim());
  status("読み込み中...");
  try {
    const list = await api("/api/admin/questions");
    // 👎が多い問題を上に
    list.sort((a, b) => Math.max(...b.fb.down) - Math.max(...a.fb.down));
    const tbody = $("rows");
    tbody.innerHTML = "";
    list.forEach((q, n) => {
      const tr = document.createElement("tr");
      const tdN = document.createElement("td"); tdN.textContent = "Q" + (n + 1);
      const tdC = document.createElement("td");
      tdC.innerHTML = `<img class="flag" src="https://flagcdn.com/w40/${q.cca2.toLowerCase()}.png"> ${q.country}`;
      const tdM = document.createElement("td");
      tdM.innerHTML = `<div>${q.lang}</div><div class="meta">${q.audience} / ${q.theme}</div>`;
      tr.append(tdN, tdC, tdM, hintCell(q, 0), hintCell(q, 1), hintCell(q, 2));
      const tdS = document.createElement("td"); tdS.className = "summary-cell"; tdS.textContent = q.summary || "";
      const tdOp = document.createElement("td");
      const del = document.createElement("button");
      del.className = "danger"; del.textContent = "削除";
      del.onclick = async () => {
        if (!confirm(`${q.country} (${q.lang}) の問題を削除しますか?`)) return;
        try { await api("/api/admin/delete", { method: "POST", body: JSON.stringify({ qid: q.qid }) }); tr.remove(); }
        catch (e) { alert(e.message); }
      };
      tdOp.appendChild(del);
      tr.append(tdS, tdOp);
      tbody.appendChild(tr);
    });
    $("tbl").hidden = false;
    status(`${list.length} 問(👎の多い順)`);
  } catch (e) { status("⚠ " + e.message); }
}

$("load").onclick = load;
$("token").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
</script>
</body>
</html>
